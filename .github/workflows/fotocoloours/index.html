<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotocolours - Bildereditor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .main-content {
            padding: 30px;
        }

        .upload-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
        }

        input[type="file"] {
            display: none;
        }

        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .controls {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: none;
        }

        .controls.active {
            display: block;
        }

        .control-group {
            margin-bottom: 25px;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #555;
            font-size: 1em;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            transition: background 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: #764ba2;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
        }

        .value-display {
            min-width: 60px;
            text-align: center;
            font-weight: 600;
            color: #667eea;
            font-size: 1.1em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #667eea;
            color: white;
        }

        .btn.active {
            background: #667eea;
            color: white;
        }

        .canvas-container {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            display: none;
        }

        .canvas-container.active {
            display: block;
        }

        #canvas {
            max-width: 100%;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: crosshair;
        }

        #canvas.rotate-mode {
            cursor: default;
        }

        .crop-overlay {
            position: absolute;
            border: 2px dashed #667eea;
            background: rgba(102, 126, 234, 0.1);
            pointer-events: none;
            display: none;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .action-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .primary-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .secondary-btn {
            background: #6c757d;
            color: white;
        }

        .secondary-btn:hover {
            background: #5a6268;
        }

        .success-btn {
            background: #28a745;
            color: white;
        }

        .success-btn:hover {
            background: #218838;
        }

        .info-text {
            text-align: center;
            color: #666;
            margin-top: 15px;
            font-style: italic;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .main-content {
                padding: 20px;
            }

            .button-group {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 Fotocolours</h1>
            <p class="subtitle">Rediger bilder med fargetonetilpasning - Alt kjører lokalt i nettleseren</p>
        </header>

        <div class="main-content">
            <div class="upload-section">
                <div class="file-input-wrapper">
                    <input type="file" id="imageInput" accept="image/*">
                    <button class="upload-btn" onclick="document.getElementById('imageInput').click()">
                        📁 Last opp bilde
                    </button>
                </div>
            </div>

            <div class="controls" id="controls">
                <div class="control-group">
                    <label>Antall farger (2-9):</label>
                    <div class="slider-container">
                        <input type="range" id="colorLevels" min="2" max="9" value="5" step="1">
                        <span class="value-display" id="colorLevelsValue">5</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Lysstyrke:</label>
                    <div class="slider-container">
                        <input type="range" id="brightness" min="-100" max="100" value="0" step="1">
                        <span class="value-display" id="brightnessValue">0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Kontrast:</label>
                    <div class="slider-container">
                        <input type="range" id="contrast" min="-100" max="100" value="0" step="1">
                        <span class="value-display" id="contrastValue">0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Verktøy:</label>
                    <div class="button-group">
                        <button class="btn" id="cropBtn">✂️ Beskjær</button>
                        <button class="btn" id="rotateLeftBtn">↶ Roter venstre</button>
                        <button class="btn" id="rotateRightBtn">↷ Roter høyre</button>
                        <button class="btn" id="resetBtn">🔄 Tilbakestill</button>
                    </div>
                </div>
            </div>

            <div class="canvas-container" id="canvasContainer">
                <canvas id="canvas"></canvas>
                <div class="crop-overlay" id="cropOverlay"></div>
                <p class="info-text" id="infoText"></p>
            </div>

            <div class="action-buttons" id="actionButtons" style="display: none;">
                <button class="action-btn success-btn" id="downloadBtn">💾 Last ned bilde</button>
            </div>
        </div>
    </div>

    <script>
        let originalImage = null;
        let currentImage = null;
        let canvas = null;
        let ctx = null;
        let cropMode = false;
        let cropStart = null;
        let cropEnd = null;
        let rotation = 0;

        document.addEventListener('DOMContentLoaded', function() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d', { willReadFrequently: true });

            document.getElementById('imageInput').addEventListener('change', handleImageUpload);
            document.getElementById('colorLevels').addEventListener('input', updateColorLevels);
            document.getElementById('brightness').addEventListener('input', updateBrightness);
            document.getElementById('contrast').addEventListener('input', updateContrast);
            document.getElementById('cropBtn').addEventListener('click', toggleCropMode);
            document.getElementById('rotateLeftBtn').addEventListener('click', () => rotateImage(-90));
            document.getElementById('rotateRightBtn').addEventListener('click', () => rotateImage(90));
            document.getElementById('resetBtn').addEventListener('click', resetImage);
            document.getElementById('downloadBtn').addEventListener('click', downloadImage);

            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseup', handleMouseUp);
        });

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    originalImage = img;
                    currentImage = img;
                    rotation = 0;
                    resetControls();
                    displayImage();
                    document.getElementById('controls').classList.add('active');
                    document.getElementById('canvasContainer').classList.add('active');
                    document.getElementById('actionButtons').style.display = 'flex';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function resetControls() {
            document.getElementById('colorLevels').value = 5;
            document.getElementById('brightness').value = 0;
            document.getElementById('contrast').value = 0;
            document.getElementById('colorLevelsValue').textContent = '5';
            document.getElementById('brightnessValue').textContent = '0';
            document.getElementById('contrastValue').textContent = '0';
            cropMode = false;
            document.getElementById('cropBtn').classList.remove('active');
            canvas.style.cursor = 'crosshair';
            document.getElementById('infoText').textContent = '';
        }

        function displayImage() {
            if (!currentImage) return;

            const maxWidth = 1000;
            const maxHeight = 800;
            let width = currentImage.width;
            let height = currentImage.height;

            if (rotation % 180 !== 0) {
                [width, height] = [height, width];
            }

            const scale = Math.min(1, maxWidth / width, maxHeight / height);
            canvas.width = width * scale;
            canvas.height = height * scale;

            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (rotation !== 0) {
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate((rotation * Math.PI) / 180);
                ctx.translate(-currentImage.width * scale / 2, -currentImage.height * scale / 2);
            }

            ctx.drawImage(currentImage, 0, 0, currentImage.width * scale, currentImage.height * scale);
            ctx.restore();

            applyEffects();
        }

        function applyEffects() {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            const brightness = parseInt(document.getElementById('brightness').value);
            const contrast = parseInt(document.getElementById('contrast').value);
            const colorLevels = parseInt(document.getElementById('colorLevels').value);

            const contrastFactor = (259 * (contrast + 255)) / (255 * (259 - contrast));

            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];

                const gray = 0.299 * r + 0.587 * g + 0.114 * b;

                let adjusted = gray + brightness;
                adjusted = contrastFactor * (adjusted - 128) + 128;
                adjusted = Math.max(0, Math.min(255, adjusted));

                const step = 255 / (colorLevels - 1);
                const level = Math.round(adjusted / step);
                const finalValue = level * step;

                data[i] = finalValue;
                data[i + 1] = finalValue;
                data[i + 2] = finalValue;
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function updateColorLevels(e) {
            document.getElementById('colorLevelsValue').textContent = e.target.value;
            displayImage();
        }

        function updateBrightness(e) {
            document.getElementById('brightnessValue').textContent = e.target.value;
            displayImage();
        }

        function updateContrast(e) {
            document.getElementById('contrastValue').textContent = e.target.value;
            displayImage();
        }

        function toggleCropMode() {
            cropMode = !cropMode;
            const btn = document.getElementById('cropBtn');
            const infoText = document.getElementById('infoText');
            
            if (cropMode) {
                btn.classList.add('active');
                canvas.style.cursor = 'crosshair';
                infoText.textContent = 'Dra for å velge område å beskjære';
            } else {
                btn.classList.remove('active');
                canvas.style.cursor = 'default';
                infoText.textContent = '';
                document.getElementById('cropOverlay').style.display = 'none';
            }
        }

        function handleMouseDown(e) {
            if (!cropMode) return;

            const rect = canvas.getBoundingClientRect();
            cropStart = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function handleMouseMove(e) {
            if (!cropMode || !cropStart) return;

            const rect = canvas.getBoundingClientRect();
            cropEnd = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };

            drawCropOverlay();
        }

        function handleMouseUp(e) {
            if (!cropMode || !cropStart) return;

            const rect = canvas.getBoundingClientRect();
            cropEnd = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };

            applyCrop();
            cropStart = null;
            cropEnd = null;
            cropMode = false;
            document.getElementById('cropBtn').classList.remove('active');
            document.getElementById('cropOverlay').style.display = 'none';
            document.getElementById('infoText').textContent = '';
        }

        function drawCropOverlay() {
            if (!cropStart || !cropEnd) return;

            const overlay = document.getElementById('cropOverlay');
            const x = Math.min(cropStart.x, cropEnd.x);
            const y = Math.min(cropStart.y, cropEnd.y);
            const width = Math.abs(cropEnd.x - cropStart.x);
            const height = Math.abs(cropEnd.y - cropStart.y);

            overlay.style.left = x + 'px';
            overlay.style.top = y + 'px';
            overlay.style.width = width + 'px';
            overlay.style.height = height + 'px';
            overlay.style.display = 'block';
        }

        function applyCrop() {
            if (!cropStart || !cropEnd) return;

            const x = Math.min(cropStart.x, cropEnd.x);
            const y = Math.min(cropStart.y, cropEnd.y);
            const width = Math.abs(cropEnd.x - cropStart.x);
            const height = Math.abs(cropEnd.y - cropStart.y);

            if (width < 10 || height < 10) return;

            const imageData = ctx.getImageData(x, y, width, height);
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = width;
            tempCanvas.height = height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.putImageData(imageData, 0, 0);

            const croppedImage = new Image();
            croppedImage.onload = function() {
                currentImage = croppedImage;
                rotation = 0;
                displayImage();
            };
            croppedImage.src = tempCanvas.toDataURL();
        }

        function rotateImage(degrees) {
            rotation = (rotation + degrees) % 360;
            if (rotation < 0) rotation += 360;

            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');

            if (degrees % 180 !== 0) {
                tempCanvas.width = currentImage.height;
                tempCanvas.height = currentImage.width;
            } else {
                tempCanvas.width = currentImage.width;
                tempCanvas.height = currentImage.height;
            }

            tempCtx.translate(tempCanvas.width / 2, tempCanvas.height / 2);
            tempCtx.rotate((degrees * Math.PI) / 180);
            tempCtx.drawImage(currentImage, -currentImage.width / 2, -currentImage.height / 2);

            const rotatedImage = new Image();
            rotatedImage.onload = function() {
                currentImage = rotatedImage;
                rotation = 0;
                displayImage();
            };
            rotatedImage.src = tempCanvas.toDataURL();
        }

        function resetImage() {
            if (!originalImage) return;
            currentImage = originalImage;
            rotation = 0;
            resetControls();
            displayImage();
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'fotocolours-edited.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
