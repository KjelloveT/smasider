<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bildebehandling - Resize, Crop, Rotasjon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Black', 'Arial Bold', Arial, system-ui, sans-serif;
            background-color: #FDFD96;
            min-height: 100vh;
            padding: 32px 24px 48px;
            color: #000;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* HEADER */
        header {
            background: #fff;
            border: 3px solid #000;
            box-shadow: 7px 7px 0 #000;
            padding: 32px 36px;
            margin-bottom: 32px;
        }

        .header-inner {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-icon {
            font-size: 3.5rem;
        }

        h1 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 900;
            color: #000;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
        }

        .subtitle {
            font-family: Arial, system-ui, sans-serif;
            font-size: 0.95rem;
            color: #000;
            margin-top: 6px;
            font-weight: 600;
        }

        /* UPLOAD ZONE */
        .upload-zone {
            background: #fff;
            border: 3px dashed #000;
            box-shadow: 5px 5px 0 #000;
            padding: 48px 32px;
            text-align: center;
            margin-bottom: 32px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upload-zone:hover,
        .upload-zone.dragover {
            background: #BAFCA2;
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0 #000;
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .upload-text {
            font-size: 1.3rem;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .upload-subtext {
            font-family: Arial, system-ui, sans-serif;
            font-size: 0.9rem;
            color: #666;
        }

        #fileInput {
            display: none;
        }

        /* CONTROLS SECTION */
        .controls-section {
            background: #fff;
            border: 3px solid #000;
            box-shadow: 7px 7px 0 #000;
            padding: 28px 32px;
            margin-bottom: 32px;
            display: none;
        }

        .controls-section.active {
            display: block;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 3px solid #000;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .control-group {
            background: #F0F8FF;
            border: 2px solid #000;
            padding: 20px;
        }

        .control-label {
            font-family: Arial, system-ui, sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-label svg {
            width: 16px;
            height: 16px;
        }

        /* INPUTS */
        input[type="number"],
        input[type="text"],
        select {
            width: 100%;
            padding: 10px 12px;
            font-family: Arial, system-ui, sans-serif;
            font-size: 0.95rem;
            border: 2px solid #000;
            margin-bottom: 10px;
            background: #fff;
        }

        input[type="range"] {
            width: 100%;
            margin: 8px 0 12px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            font-family: Arial, system-ui, sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
        }

        /* BUTTONS */
        .btn {
            display: inline-block;
            background: #fff;
            color: #000;
            border: 2px solid #000;
            box-shadow: 3px 3px 0 #000;
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.1s ease;
            text-decoration: none;
        }

        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 #000;
        }

        .btn:active {
            transform: translate(1px, 1px);
            box-shadow: 2px 2px 0 #000;
        }

        .btn-primary {
            background: #FFDB58;
        }

        .btn-success {
            background: #BAFCA2;
        }

        .btn-danger {
            background: #FFB2B2;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .btn-group .btn {
            flex: 1;
            min-width: 60px;
            text-align: center;
        }

        /* PREVIEW GRID */
        .preview-section {
            display: none;
        }

        .preview-section.active {
            display: block;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .preview-card {
            background: #fff;
            border: 3px solid #000;
            box-shadow: 5px 5px 0 #000;
            padding: 16px;
            position: relative;
        }

        .preview-card.selected {
            border-color: #FFDB58;
            box-shadow: 5px 5px 0 #FFDB58;
        }

        .preview-img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            background: #f0f0f0;
            margin-bottom: 12px;
            border: 2px solid #000;
        }

        .preview-info {
            font-family: Arial, system-ui, sans-serif;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .preview-info span {
            display: block;
            margin-bottom: 4px;
        }

        .preview-size {
            font-weight: 700;
            color: #666;
        }

        .preview-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .preview-actions .btn {
            padding: 6px 12px;
            font-size: 0.75rem;
        }

        /* CROP OVERLAY */
        .crop-container {
            position: relative;
            display: none;
            margin: 20px 0;
        }

        .crop-container.active {
            display: block;
        }

        .crop-canvas {
            max-width: 100%;
            border: 2px solid #000;
        }

        .crop-overlay {
            position: absolute;
            border: 2px dashed #FF0000;
            background: rgba(255, 0, 0, 0.1);
            cursor: move;
        }

        .crop-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #FF0000;
            border: 2px solid #000;
            cursor: nwse-resize;
        }

        .crop-handle.nw { top: -6px; left: -6px; cursor: nwse-resize; }
        .crop-handle.ne { top: -6px; right: -6px; cursor: nesw-resize; }
        .crop-handle.sw { bottom: -6px; left: -6px; cursor: nesw-resize; }
        .crop-handle.se { bottom: -6px; right: -6px; cursor: nwse-resize; }

        /* POSITION GRID FOR WATERMARK */
        .position-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            width: 120px;
            margin-bottom: 12px;
        }

        .position-btn {
            aspect-ratio: 1;
            border: 2px solid #000;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            transition: all 0.1s;
        }

        .position-btn:hover {
            background: #f0f0f0;
        }

        .position-btn.active {
            background: #FFDB58;
        }

        /* ACTION BAR */
        .action-bar {
            background: #fff;
            border: 3px solid #000;
            box-shadow: 7px 7px 0 #000;
            padding: 20px 32px;
            margin-bottom: 32px;
            display: none;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .action-bar.active {
            display: flex;
        }

        .action-bar-left {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .action-bar-right {
            display: flex;
            gap: 12px;
        }

        .image-count {
            font-family: Arial, system-ui, sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            body { padding: 20px 16px 32px; }
            header { padding: 24px 24px; }
            .upload-zone { padding: 32px 20px; }
            .controls-grid { grid-template-columns: 1fr; }
            .action-bar { flex-direction: column; align-items: stretch; }
            .action-bar-left, .action-bar-right { flex-direction: column; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-inner">
                <span class="header-icon">🖼️</span>
                <div>
                    <h1>Bildebehandling</h1>
                    <p class="subtitle">Resize, crop, rotasjon og watermark - alt kjører lokalt i nettleseren</p>
                </div>
            </div>
        </header>

        <!-- UPLOAD ZONE -->
        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Dra og slipp bilder her</div>
            <div class="upload-subtext">eller klikk for å velge filer</div>
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>

        <!-- CONTROLS -->
        <div class="controls-section" id="controlsSection">
            <div class="section-title">⚙️ Innstillinger</div>
            <div class="controls-grid">
                <!-- RESIZE -->
                <div class="control-group">
                    <div class="control-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
                        Resize
                    </div>
                    <div class="btn-group">
                        <button class="btn" onclick="setResizePreset(1920)">1920px</button>
                        <button class="btn" onclick="setResizePreset(1280)">1280px</button>
                        <button class="btn" onclick="setResizePreset(800)">800px</button>
                    </div>
                    <div class="btn-group">
                        <button class="btn" onclick="setResizePercent(50)">50%</button>
                        <button class="btn" onclick="setResizePercent(75)">75%</button>
                        <button class="btn" onclick="setResizePercent(100)">100%</button>
                    </div>
                    <input type="number" id="resizeWidth" placeholder="Bredde (px)">
                    <input type="number" id="resizeHeight" placeholder="Høyde (px)">
                    <div class="checkbox-group">
                        <input type="checkbox" id="lockAspect" checked>
                        <label for="lockAspect">Lås forhold</label>
                    </div>
                </div>

                <!-- ROTATION -->
                <div class="control-group">
                    <div class="control-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                        Rotasjon
                    </div>
                    <div class="btn-group">
                        <button class="btn" onclick="rotateImage(-90)">-90°</button>
                        <button class="btn" onclick="rotateImage(90)">+90°</button>
                        <button class="btn" onclick="rotateImage(180)">180°</button>
                    </div>
                    <label style="font-family: Arial, sans-serif; font-size: 0.85rem; font-weight: 600;">Fritt: <span id="rotationValue">0</span>°</label>
                    <input type="range" id="freeRotation" min="0" max="360" value="0" oninput="updateFreeRotation()">
                </div>

                <!-- FORMAT -->
                <div class="control-group">
                    <div class="control-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                        Format
                    </div>
                    <select id="outputFormat">
                        <option value="jpeg">JPEG</option>
                        <option value="png">PNG</option>
                        <option value="webp">WebP</option>
                    </select>
                    <label style="font-family: Arial, sans-serif; font-size: 0.85rem; font-weight: 600;">Kvalitet: <span id="qualityValue">90</span>%</label>
                    <input type="range" id="quality" min="10" max="100" value="90" oninput="updateQuality()">
                </div>

                <!-- WATERMARK -->
                <div class="control-group">
                    <div class="control-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
                        Watermark
                    </div>
                    <input type="text" id="watermarkText" placeholder="Watermark tekst">
                    <div class="position-grid" id="positionGrid">
                        <button class="position-btn" data-pos="top-left">↖</button>
                        <button class="position-btn active" data-pos="top-center">↑</button>
                        <button class="position-btn" data-pos="top-right">↗</button>
                        <button class="position-btn" data-pos="center-left">←</button>
                        <button class="position-btn" data-pos="center">⊙</button>
                        <button class="position-btn" data-pos="center-right">→</button>
                        <button class="position-btn" data-pos="bottom-left">↙</button>
                        <button class="position-btn" data-pos="bottom-center">↓</button>
                        <button class="position-btn" data-pos="bottom-right">↘</button>
                    </div>
                    <label style="font-family: Arial, sans-serif; font-size: 0.85rem; font-weight: 600;">Størrelse: <span id="fontSizeValue">24</span>px</label>
                    <input type="range" id="fontSize" min="12" max="72" value="24" oninput="updateFontSize()">
                    <label style="font-family: Arial, sans-serif; font-size: 0.85rem; font-weight: 600;">Opacity: <span id="opacityValue">80</span>%</label>
                    <input type="range" id="opacity" min="10" max="100" value="80" oninput="updateOpacity()">
                </div>

                <!-- BULK RENAME -->
                <div class="control-group">
                    <div class="control-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                        Filnavn
                    </div>
                    <input type="text" id="namePattern" placeholder="bilde_{n}" value="bilde_{n}">
                    <p style="font-family: Arial, sans-serif; font-size: 0.75rem; color: #666; margin-top: 8px;">Bruk {n} for nummerering</p>
                </div>
            </div>
        </div>

        <!-- CROP CONTAINER -->
        <div class="crop-container" id="cropContainer">
            <div class="section-title">✂️ Crop</div>
            <canvas id="cropCanvas" class="crop-canvas"></canvas>
            <div class="crop-overlay" id="cropOverlay">
                <div class="crop-handle nw" data-handle="nw"></div>
                <div class="crop-handle ne" data-handle="ne"></div>
                <div class="crop-handle sw" data-handle="sw"></div>
                <div class="crop-handle se" data-handle="se"></div>
            </div>
            <div class="btn-group" style="margin-top: 16px;">
                <button class="btn btn-success" onclick="applyCrop()">Bruk crop</button>
                <button class="btn btn-danger" onclick="cancelCrop()">Avbryt</button>
            </div>
        </div>

        <!-- ACTION BAR -->
        <div class="action-bar" id="actionBar">
            <div class="action-bar-left">
                <span class="image-count" id="imageCount">0 bilder</span>
                <button class="btn btn-primary" onclick="applyToAll()">Bruk på alle</button>
                <button class="btn" onclick="resetAll()">Nullstill</button>
                <button class="btn btn-danger" onclick="clearAll()">Slett alle</button>
            </div>
            <div class="action-bar-right">
                <button class="btn btn-success" onclick="downloadAllZip()">📦 Last ned alle (ZIP)</button>
            </div>
        </div>

        <!-- PREVIEW -->
        <div class="preview-section" id="previewSection">
            <div class="section-title">👁️ Bilder</div>
            <div class="preview-grid" id="previewGrid"></div>
        </div>
    </div>

    <!-- JSZip for ZIP download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        // State
        let images = [];
        let selectedImage = null;
        let aspectRatio = 1;
        let watermarkPosition = 'top-center';
        let cropData = null;

        // DOM Elements
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const controlsSection = document.getElementById('controlsSection');
        const previewSection = document.getElementById('previewSection');
        const actionBar = document.getElementById('actionBar');
        const previewGrid = document.getElementById('previewGrid');
        const imageCount = document.getElementById('imageCount');

        // Upload handlers
        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const imageData = {
                                id: Date.now() + Math.random(),
                                name: file.name,
                                originalData: e.target.result,
                                originalSize: file.size,
                                originalWidth: img.width,
                                originalHeight: img.height,
                                processedData: null,
                                processedSize: null,
                                rotation: 0,
                                crop: null
                            };
                            images.push(imageData);
                            updateUI();
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        function updateUI() {
            if (images.length > 0) {
                controlsSection.classList.add('active');
                previewSection.classList.add('active');
                actionBar.classList.add('active');
            } else {
                controlsSection.classList.remove('active');
                previewSection.classList.remove('active');
                actionBar.classList.remove('active');
            }
            imageCount.textContent = `${images.length} bilder`;
            renderPreview();
        }

        function renderPreview() {
            previewGrid.innerHTML = '';
            images.forEach((img, index) => {
                const card = document.createElement('div');
                card.className = 'preview-card' + (selectedImage === img.id ? ' selected' : '');
                card.onclick = () => selectImage(img.id);
                
                const displayData = img.processedData || img.originalData;
                const displaySize = img.processedSize || img.originalSize;
                
                card.innerHTML = `
                    <img src="${displayData}" class="preview-img" alt="${img.name}">
                    <div class="preview-info">
                        <span style="font-weight: 700;">${img.name}</span>
                        <span class="preview-size">${formatSize(displaySize)}</span>
                        <span>${img.originalWidth} × ${img.originalHeight}px</span>
                    </div>
                    <div class="preview-actions">
                        <button class="btn btn-primary" onclick="event.stopPropagation(); downloadSingle(${index})">⬇️ Last ned</button>
                        <button class="btn btn-danger" onclick="event.stopPropagation(); removeImage(${index})">🗑️ Slett</button>
                    </div>
                `;
                previewGrid.appendChild(card);
            });
        }

        function selectImage(id) {
            selectedImage = id;
            const img = images.find(i => i.id === id);
            if (img) {
                document.getElementById('resizeWidth').value = img.originalWidth;
                document.getElementById('resizeHeight').value = img.originalHeight;
                aspectRatio = img.originalWidth / img.originalHeight;
            }
            renderPreview();
        }

        function removeImage(index) {
            images.splice(index, 1);
            selectedImage = null;
            updateUI();
        }

        function clearAll() {
            images = [];
            selectedImage = null;
            updateUI();
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        // Resize functions
        function setResizePreset(size) {
            document.getElementById('resizeWidth').value = size;
            if (document.getElementById('lockAspect').checked) {
                document.getElementById('resizeHeight').value = Math.round(size / aspectRatio);
            }
        }

        function setResizePercent(percent) {
            if (selectedImage) {
                const img = images.find(i => i.id === selectedImage);
                if (img) {
                    document.getElementById('resizeWidth').value = Math.round(img.originalWidth * percent / 100);
                    document.getElementById('resizeHeight').value = Math.round(img.originalHeight * percent / 100);
                }
            }
        }

        document.getElementById('resizeWidth').addEventListener('input', function() {
            if (document.getElementById('lockAspect').checked && this.value) {
                document.getElementById('resizeHeight').value = Math.round(this.value / aspectRatio);
            }
        });

        document.getElementById('resizeHeight').addEventListener('input', function() {
            if (document.getElementById('lockAspect').checked && this.value) {
                document.getElementById('resizeWidth').value = Math.round(this.value * aspectRatio);
            }
        });

        // Rotation
        function rotateImage(degrees) {
            document.getElementById('freeRotation').value = 0;
            document.getElementById('rotationValue').textContent = '0';
            // Apply to selected image
            if (selectedImage) {
                const img = images.find(i => i.id === selectedImage);
                if (img) {
                    img.rotation = (img.rotation + degrees) % 360;
                    processImage(img);
                }
            }
        }

        function updateFreeRotation() {
            const value = document.getElementById('freeRotation').value;
            document.getElementById('rotationValue').textContent = value;
            if (selectedImage) {
                const img = images.find(i => i.id === selectedImage);
                if (img) {
                    img.rotation = parseInt(value);
                    processImage(img);
                }
            }
        }

        // Quality
        function updateQuality() {
            document.getElementById('qualityValue').textContent = document.getElementById('quality').value;
        }

        // Font size
        function updateFontSize() {
            document.getElementById('fontSizeValue').textContent = document.getElementById('fontSize').value;
        }

        // Opacity
        function updateOpacity() {
            document.getElementById('opacityValue').textContent = document.getElementById('opacity').value;
        }

        // Watermark position
        document.querySelectorAll('.position-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.position-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                watermarkPosition = this.dataset.pos;
            });
        });

        // Process single image
        function processImage(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Apply rotation
            if (img.rotation !== 0) {
                const radians = img.rotation * Math.PI / 180;
                const sin = Math.abs(Math.sin(radians));
                const cos = Math.abs(Math.cos(radians));
                canvas.width = img.originalWidth * cos + img.originalHeight * sin;
                canvas.height = img.originalWidth * sin + img.originalHeight * cos;
            } else {
                canvas.width = img.originalWidth;
                canvas.height = img.originalHeight;
            }
            
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(img.rotation * Math.PI / 180);
            ctx.drawImage(img.originalData, -img.originalWidth / 2, -img.originalHeight / 2);
            
            // Apply resize
            const newWidth = parseInt(document.getElementById('resizeWidth').value) || img.originalWidth;
            const newHeight = parseInt(document.getElementById('resizeHeight').value) || img.originalHeight;
            
            if (newWidth !== img.originalWidth || newHeight !== img.originalHeight) {
                const resizeCanvas = document.createElement('canvas');
                resizeCanvas.width = newWidth;
                resizeCanvas.height = newHeight;
                const resizeCtx = resizeCanvas.getContext('2d');
                resizeCtx.drawImage(canvas, 0, 0, newWidth, newHeight);
                canvas.width = newWidth;
                canvas.height = newHeight;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(resizeCanvas, 0, 0);
            }
            
            // Apply watermark
            const watermarkText = document.getElementById('watermarkText').value;
            if (watermarkText) {
                const fontSize = parseInt(document.getElementById('fontSize').value);
                const opacity = parseInt(document.getElementById('opacity').value) / 100;
                
                ctx.save();
                ctx.globalAlpha = opacity;
                ctx.font = `bold ${fontSize}px Arial`;
                ctx.fillStyle = '#FFFFFF';
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                
                const metrics = ctx.measureText(watermarkText);
                const textWidth = metrics.width;
                const textHeight = fontSize;
                const padding = 20;
                
                let x, y;
                switch (watermarkPosition) {
                    case 'top-left': x = padding; y = padding + textHeight; break;
                    case 'top-center': x = (canvas.width - textWidth) / 2; y = padding + textHeight; break;
                    case 'top-right': x = canvas.width - textWidth - padding; y = padding + textHeight; break;
                    case 'center-left': x = padding; y = canvas.height / 2; break;
                    case 'center': x = (canvas.width - textWidth) / 2; y = canvas.height / 2; break;
                    case 'center-right': x = canvas.width - textWidth - padding; y = canvas.height / 2; break;
                    case 'bottom-left': x = padding; y = canvas.height - padding; break;
                    case 'bottom-center': x = (canvas.width - textWidth) / 2; y = canvas.height - padding; break;
                    case 'bottom-right': x = canvas.width - textWidth - padding; y = canvas.height - padding; break;
                }
                
                ctx.strokeText(watermarkText, x, y);
                ctx.fillText(watermarkText, x, y);
                ctx.restore();
            }
            
            // Export
            const format = document.getElementById('outputFormat').value;
            const quality = parseInt(document.getElementById('quality').value) / 100;
            const mimeType = format === 'png' ? 'image/png' : format === 'webp' ? 'image/webp' : 'image/jpeg';
            
            canvas.toBlob((blob) => {
                img.processedData = URL.createObjectURL(blob);
                img.processedSize = blob.size;
                renderPreview();
            }, mimeType, quality);
        }

        // Apply to all
        function applyToAll() {
            images.forEach(img => {
                img.rotation = 0;
                processImage(img);
            });
        }

        // Reset all
        function resetAll() {
            images.forEach(img => {
                img.processedData = null;
                img.processedSize = null;
                img.rotation = 0;
            });
            renderPreview();
        }

        // Download single
        function downloadSingle(index) {
            const img = images[index];
            const data = img.processedData || img.originalData;
            const format = document.getElementById('outputFormat').value;
            const ext = format === 'png' ? 'png' : format === 'webp' ? 'webp' : 'jpg';
            
            const link = document.createElement('a');
            link.href = data;
            link.download = img.name.replace(/\.[^/.]+$/, '') + '.' + ext;
            link.click();
        }

        // Download all as ZIP
        async function downloadAllZip() {
            const zip = new JSZip();
            const pattern = document.getElementById('namePattern').value || 'bilde_{n}';
            const format = document.getElementById('outputFormat').value;
            const ext = format === 'png' ? 'png' : format === 'webp' ? 'webp' : 'jpg';
            
            images.forEach((img, index) => {
                const data = img.processedData || img.originalData;
                const filename = pattern.replace('{n}', String(index + 1).padStart(3, '0')) + '.' + ext;
                
                // Fetch blob from URL
                fetch(data).then(response => response.blob()).then(blob => {
                    zip.file(filename, blob);
                });
            });
            
            // Generate ZIP
            setTimeout(async () => {
                const content = await zip.generateAsync({ type: 'blob' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = 'bilder.zip';
                link.click();
            }, 500);
        }

        // Crop functions
        let cropStartX, cropStartY, cropEndX, cropEndY;
        let isDragging = false;
        let isResizing = false;
        let currentHandle = null;

        function startCrop() {
            if (!selectedImage) {
                alert('Velg et bilde først');
                return;
            }
            
            const img = images.find(i => i.id === selectedImage);
            if (!img) return;
            
            const canvas = document.getElementById('cropCanvas');
            const ctx = canvas.getContext('2d');
            
            // Set canvas size
            const maxWidth = 800;
            const scale = Math.min(maxWidth / img.originalWidth, maxWidth / img.originalHeight, 1);
            canvas.width = img.originalWidth * scale;
            canvas.height = img.originalHeight * scale;
            
            // Draw image
            ctx.drawImage(img.originalData, 0, 0, canvas.width, canvas.height);
            
            // Initialize crop area (center 50%)
            cropStartX = canvas.width * 0.25;
            cropStartY = canvas.height * 0.25;
            cropEndX = canvas.width * 0.75;
            cropEndY = canvas.height * 0.75;
            
            updateCropOverlay();
            document.getElementById('cropContainer').classList.add('active');
        }

        function updateCropOverlay() {
            const overlay = document.getElementById('cropOverlay');
            const canvas = document.getElementById('cropCanvas');
            const rect = canvas.getBoundingClientRect();
            
            const x = Math.min(cropStartX, cropEndX);
            const y = Math.min(cropStartY, cropEndY);
            const width = Math.abs(cropEndX - cropStartX);
            const height = Math.abs(cropEndY - cropStartY);
            
            overlay.style.left = x + 'px';
            overlay.style.top = y + 'px';
            overlay.style.width = width + 'px';
            overlay.style.height = height + 'px';
        }

        // Crop overlay events
        const cropOverlay = document.getElementById('cropOverlay');
        const cropCanvas = document.getElementById('cropCanvas');

        cropOverlay.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('crop-handle')) {
                isResizing = true;
                currentHandle = e.target.dataset.handle;
            } else {
                isDragging = true;
                const rect = cropOverlay.getBoundingClientRect();
                cropOverlay.dataset.offsetX = e.clientX - rect.left;
                cropOverlay.dataset.offsetY = e.clientY - rect.top;
            }
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging && !isResizing) return;
            
            const canvasRect = cropCanvas.getBoundingClientRect();
            const x = e.clientX - canvasRect.left;
            const y = e.clientY - canvasRect.top;
            
            if (isDragging) {
                const offsetX = parseFloat(cropOverlay.dataset.offsetX);
                const offsetY = parseFloat(cropOverlay.dataset.offsetY);
                const width = parseFloat(cropOverlay.style.width);
                const height = parseFloat(cropOverlay.style.height);
                
                cropStartX = Math.max(0, Math.min(canvasRect.width - width, x - offsetX));
                cropStartY = Math.max(0, Math.min(canvasRect.height - height, y - offsetY));
                cropEndX = cropStartX + width;
                cropEndY = cropStartY + height;
            } else if (isResizing) {
                switch (currentHandle) {
                    case 'nw':
                        cropStartX = Math.max(0, x);
                        cropStartY = Math.max(0, y);
                        break;
                    case 'ne':
                        cropEndX = Math.min(canvasRect.width, x);
                        cropStartY = Math.max(0, y);
                        break;
                    case 'sw':
                        cropStartX = Math.max(0, x);
                        cropEndY = Math.min(canvasRect.height, y);
                        break;
                    case 'se':
                        cropEndX = Math.min(canvasRect.width, x);
                        cropEndY = Math.min(canvasRect.height, y);
                        break;
                }
            }
            
            updateCropOverlay();
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            isResizing = false;
            currentHandle = null;
        });

        function applyCrop() {
            if (!selectedImage) return;
            
            const img = images.find(i => i.id === selectedImage);
            if (!img) return;
            
            const canvas = document.getElementById('cropCanvas');
            const scale = canvas.width / img.originalWidth;
            
            // Calculate crop coordinates in original image space
            const x = Math.min(cropStartX, cropEndX) / scale;
            const y = Math.min(cropStartY, cropEndY) / scale;
            const width = Math.abs(cropEndX - cropStartX) / scale;
            const height = Math.abs(cropEndY - cropStartY) / scale;
            
            // Create cropped canvas
            const cropCanvas = document.createElement('canvas');
            cropCanvas.width = width;
            cropCanvas.height = height;
            const ctx = cropCanvas.getContext('2d');
            
            // Draw cropped image
            const sourceImg = new Image();
            sourceImg.onload = () => {
                ctx.drawImage(sourceImg, x, y, width, height, 0, 0, width, height);
                
                // Update image data
                cropCanvas.toBlob((blob) => {
                    img.originalData = URL.createObjectURL(blob);
                    img.originalWidth = width;
                    img.originalHeight = height;
                    img.processedData = null;
                    img.processedSize = null;
                    img.rotation = 0;
                    
                    cancelCrop();
                    selectImage(img.id);
                    renderPreview();
                }, 'image/png');
            };
            sourceImg.src = img.originalData;
        }

        function cancelCrop() {
            document.getElementById('cropContainer').classList.remove('active');
        }

        // Add crop button to preview actions
        function addCropButton() {
            const cards = document.querySelectorAll('.preview-card');
            cards.forEach((card, index) => {
                const actions = card.querySelector('.preview-actions');
                if (!actions.querySelector('.crop-btn')) {
                    const cropBtn = document.createElement('button');
                    cropBtn.className = 'btn crop-btn';
                    cropBtn.textContent = '✂️ Crop';
                    cropBtn.onclick = (e) => {
                        e.stopPropagation();
                        selectImage(images[index].id);
                        startCrop();
                    };
                    actions.appendChild(cropBtn);
                }
            });
        }

        // Call addCropButton after renderPreview
        const originalRenderPreview = renderPreview;
        renderPreview = function() {
            originalRenderPreview();
            addCropButton();
        };
    </script>
</body>
</html>
