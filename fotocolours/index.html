<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotocolours - Bildereditor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Black', 'Arial Bold', Arial, system-ui, sans-serif;
            background-color: #FDFD96;
            min-height: 100vh;
            padding: 32px 24px 48px;
            color: #000;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #fff;
            color: #000;
            border: 3px solid #000;
            box-shadow: 4px 4px 0 #000;
            width: 48px;
            height: 48px;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, box-shadow 0.1s;
            text-decoration: none;
        }

        .back-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #000;
        }

        .back-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #000;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: #C4A1FF;
            border: 3px solid #000;
            box-shadow: 7px 7px 0 #000;
            padding: 32px 36px;
            margin-bottom: 32px;
            position: relative;
        }

        .header-stripe {
            height: 10px;
            background: repeating-linear-gradient(
                -45deg,
                #000 0px,
                #000 5px,
                #C4A1FF 5px,
                #C4A1FF 14px
            );
            margin: 20px -36px -32px;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 900;
            color: #000;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .subtitle {
            font-family: Arial, system-ui, sans-serif;
            font-size: 1rem;
            color: #000;
            font-weight: 600;
        }

        .main-content {
            padding: 0;
        }

        .upload-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
        }

        input[type="file"] {
            display: none;
        }

        .upload-btn {
            background: #BAFCA2;
            color: #000;
            padding: 14px 32px;
            border: 3px solid #000;
            box-shadow: 5px 5px 0 #000;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.1s, box-shadow 0.1s;
            font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
        }

        .upload-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0 #000;
        }

        .upload-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0 #000;
        }

        .controls {
            background: #fff;
            border: 3px solid #000;
            box-shadow: 5px 5px 0 #000;
            padding: 28px;
            margin-bottom: 32px;
            display: none;
        }

        .controls.active {
            display: block;
        }

        .control-group {
            margin-bottom: 24px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        .control-group label {
            display: block;
            font-weight: 900;
            margin-bottom: 10px;
            color: #000;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 8px;
            background: #000;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            border: 2px solid #000;
            border-radius: 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 0;
            background: #FFDB58;
            cursor: pointer;
            border: 2px solid #000;
            box-shadow: 2px 2px 0 #000;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: #FFA07A;
        }

        input[type="range"]::-moz-range-thumb {
            width: 22px;
            height: 22px;
            border-radius: 0;
            background: #FFDB58;
            cursor: pointer;
            border: 2px solid #000;
        }

        .value-display {
            min-width: 60px;
            text-align: center;
            font-weight: 900;
            color: #000;
            font-size: 1.1rem;
            background: #FFDB58;
            border: 2px solid #000;
            padding: 4px 8px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: 3px solid #000;
            box-shadow: 3px 3px 0 #000;
            background: #fff;
            color: #000;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.1s, box-shadow 0.1s;
            font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
        }

        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 #000;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #000;
        }

        .btn.active {
            background: #FFDB58;
        }

        .canvas-container {
            text-align: center;
            margin-bottom: 24px;
            position: relative;
            display: none;
            background: #fff;
            border: 3px solid #000;
            box-shadow: 5px 5px 0 #000;
            padding: 20px;
        }

        .canvas-container.active {
            display: block;
        }

        #canvas {
            max-width: 100%;
            border: 2px solid #000;
            cursor: crosshair;
        }

        #canvas.rotate-mode {
            cursor: default;
        }

        .crop-overlay {
            position: absolute;
            border: 3px dashed #000;
            background: rgba(255, 219, 88, 0.25);
            pointer-events: none;
            display: none;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .action-btn {
            padding: 12px 30px;
            border: 3px solid #000;
            box-shadow: 4px 4px 0 #000;
            font-size: 0.95rem;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.1s, box-shadow 0.1s;
            font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
        }

        .action-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #000;
        }

        .action-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #000;
        }

        .primary-btn {
            background: #87CEEB;
            color: #000;
        }

        .secondary-btn {
            background: #fff;
            color: #000;
        }

        .success-btn {
            background: #BAFCA2;
            color: #000;
        }

        .info-text {
            text-align: center;
            color: #000;
            margin-top: 15px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-family: Arial, system-ui, sans-serif;
        }

        @media (max-width: 768px) {
            body { padding: 20px 16px 40px; }
            h1 { font-size: 1.8rem; }
            header { padding: 24px; }
            .header-stripe { margin: 16px -24px -24px; }

            .button-group {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <a class="back-btn" href="../index.html" title="Tilbake">🏠</a>
    <div class="container">
        <header>
            <h1>🎨 Fotocolours</h1>
            <p class="subtitle">Rediger bilder med fargetonetilpasning - Alt kjører lokalt i nettleseren</p>
            <div class="header-stripe"></div>
        </header>

        <div class="main-content">
            <div class="upload-section">
                <div class="file-input-wrapper">
                    <input type="file" id="imageInput" accept="image/*">
                    <button class="upload-btn" onclick="document.getElementById('imageInput').click()">
                        📁 Last opp bilde
                    </button>
                </div>
            </div>

            <div class="controls" id="controls">
                <div class="control-group">
                    <label>Antall farger (2-9):</label>
                    <div class="slider-container">
                        <input type="range" id="colorLevels" min="2" max="9" value="5" step="1">
                        <span class="value-display" id="colorLevelsValue">5</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Lysstyrke:</label>
                    <div class="slider-container">
                        <input type="range" id="brightness" min="-100" max="100" value="0" step="1">
                        <span class="value-display" id="brightnessValue">0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Kontrast:</label>
                    <div class="slider-container">
                        <input type="range" id="contrast" min="-100" max="100" value="0" step="1">
                        <span class="value-display" id="contrastValue">0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Verktøy:</label>
                    <div class="button-group">
                        <button class="btn" id="cropBtn">✂️ Beskjær</button>
                        <button class="btn" id="rotateLeftBtn">↶ Roter venstre</button>
                        <button class="btn" id="rotateRightBtn">↷ Roter høyre</button>
                        <button class="btn" id="resetBtn">🔄 Tilbakestill</button>
                    </div>
                </div>
            </div>

            <div class="canvas-container" id="canvasContainer">
                <canvas id="canvas"></canvas>
                <div class="crop-overlay" id="cropOverlay"></div>
                <p class="info-text" id="infoText"></p>
            </div>

            <div class="action-buttons" id="actionButtons" style="display: none;">
                <button class="action-btn success-btn" id="downloadBtn">💾 Last ned bilde</button>
            </div>
        </div>
    </div>

    <script>
        let originalImage = null;
        let currentImage = null;
        let canvas = null;
        let ctx = null;
        let cropMode = false;
        let cropStart = null;
        let cropEnd = null;
        let rotation = 0;

        document.addEventListener('DOMContentLoaded', function() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d', { willReadFrequently: true });

            document.getElementById('imageInput').addEventListener('change', handleImageUpload);
            document.getElementById('colorLevels').addEventListener('input', updateColorLevels);
            document.getElementById('brightness').addEventListener('input', updateBrightness);
            document.getElementById('contrast').addEventListener('input', updateContrast);
            document.getElementById('cropBtn').addEventListener('click', toggleCropMode);
            document.getElementById('rotateLeftBtn').addEventListener('click', () => rotateImage(-90));
            document.getElementById('rotateRightBtn').addEventListener('click', () => rotateImage(90));
            document.getElementById('resetBtn').addEventListener('click', resetImage);
            document.getElementById('downloadBtn').addEventListener('click', downloadImage);

            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseup', handleMouseUp);
        });

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    originalImage = img;
                    currentImage = img;
                    rotation = 0;
                    resetControls();
                    displayImage();
                    document.getElementById('controls').classList.add('active');
                    document.getElementById('canvasContainer').classList.add('active');
                    document.getElementById('actionButtons').style.display = 'flex';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function resetControls() {
            document.getElementById('colorLevels').value = 5;
            document.getElementById('brightness').value = 0;
            document.getElementById('contrast').value = 0;
            document.getElementById('colorLevelsValue').textContent = '5';
            document.getElementById('brightnessValue').textContent = '0';
            document.getElementById('contrastValue').textContent = '0';
            cropMode = false;
            document.getElementById('cropBtn').classList.remove('active');
            canvas.style.cursor = 'crosshair';
            document.getElementById('infoText').textContent = '';
        }

        function displayImage() {
            if (!currentImage) return;

            const maxWidth = 1000;
            const maxHeight = 800;
            let width = currentImage.width;
            let height = currentImage.height;

            if (rotation % 180 !== 0) {
                [width, height] = [height, width];
            }

            const scale = Math.min(1, maxWidth / width, maxHeight / height);
            canvas.width = width * scale;
            canvas.height = height * scale;

            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (rotation !== 0) {
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate((rotation * Math.PI) / 180);
                ctx.translate(-currentImage.width * scale / 2, -currentImage.height * scale / 2);
            }

            ctx.drawImage(currentImage, 0, 0, currentImage.width * scale, currentImage.height * scale);
            ctx.restore();

            applyEffects();
        }

        function applyEffects() {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            const brightness = parseInt(document.getElementById('brightness').value);
            const contrast = parseInt(document.getElementById('contrast').value);
            const colorLevels = parseInt(document.getElementById('colorLevels').value);

            const contrastFactor = (259 * (contrast + 255)) / (255 * (259 - contrast));

            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];

                const gray = 0.299 * r + 0.587 * g + 0.114 * b;

                let adjusted = gray + brightness;
                adjusted = contrastFactor * (adjusted - 128) + 128;
                adjusted = Math.max(0, Math.min(255, adjusted));

                const step = 255 / (colorLevels - 1);
                const level = Math.round(adjusted / step);
                const finalValue = level * step;

                data[i] = finalValue;
                data[i + 1] = finalValue;
                data[i + 2] = finalValue;
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function updateColorLevels(e) {
            document.getElementById('colorLevelsValue').textContent = e.target.value;
            displayImage();
        }

        function updateBrightness(e) {
            document.getElementById('brightnessValue').textContent = e.target.value;
            displayImage();
        }

        function updateContrast(e) {
            document.getElementById('contrastValue').textContent = e.target.value;
            displayImage();
        }

        function toggleCropMode() {
            cropMode = !cropMode;
            const btn = document.getElementById('cropBtn');
            const infoText = document.getElementById('infoText');
            
            if (cropMode) {
                btn.classList.add('active');
                canvas.style.cursor = 'crosshair';
                infoText.textContent = 'Dra for å velge område å beskjære';
            } else {
                btn.classList.remove('active');
                canvas.style.cursor = 'default';
                infoText.textContent = '';
                document.getElementById('cropOverlay').style.display = 'none';
            }
        }

        function handleMouseDown(e) {
            if (!cropMode) return;

            const rect = canvas.getBoundingClientRect();
            cropStart = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function handleMouseMove(e) {
            if (!cropMode || !cropStart) return;

            const rect = canvas.getBoundingClientRect();
            cropEnd = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };

            drawCropOverlay();
        }

        function handleMouseUp(e) {
            if (!cropMode || !cropStart) return;

            const rect = canvas.getBoundingClientRect();
            cropEnd = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };

            applyCrop();
            cropStart = null;
            cropEnd = null;
            cropMode = false;
            document.getElementById('cropBtn').classList.remove('active');
            document.getElementById('cropOverlay').style.display = 'none';
            document.getElementById('infoText').textContent = '';
        }

        function drawCropOverlay() {
            if (!cropStart || !cropEnd) return;

            const overlay = document.getElementById('cropOverlay');
            const x = Math.min(cropStart.x, cropEnd.x);
            const y = Math.min(cropStart.y, cropEnd.y);
            const width = Math.abs(cropEnd.x - cropStart.x);
            const height = Math.abs(cropEnd.y - cropStart.y);

            overlay.style.left = x + 'px';
            overlay.style.top = y + 'px';
            overlay.style.width = width + 'px';
            overlay.style.height = height + 'px';
            overlay.style.display = 'block';
        }

        function applyCrop() {
            if (!cropStart || !cropEnd) return;

            const x = Math.min(cropStart.x, cropEnd.x);
            const y = Math.min(cropStart.y, cropEnd.y);
            const width = Math.abs(cropEnd.x - cropStart.x);
            const height = Math.abs(cropEnd.y - cropStart.y);

            if (width < 10 || height < 10) return;

            const imageData = ctx.getImageData(x, y, width, height);
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = width;
            tempCanvas.height = height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.putImageData(imageData, 0, 0);

            const croppedImage = new Image();
            croppedImage.onload = function() {
                currentImage = croppedImage;
                rotation = 0;
                displayImage();
            };
            croppedImage.src = tempCanvas.toDataURL();
        }

        function rotateImage(degrees) {
            rotation = (rotation + degrees) % 360;
            if (rotation < 0) rotation += 360;

            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');

            if (degrees % 180 !== 0) {
                tempCanvas.width = currentImage.height;
                tempCanvas.height = currentImage.width;
            } else {
                tempCanvas.width = currentImage.width;
                tempCanvas.height = currentImage.height;
            }

            tempCtx.translate(tempCanvas.width / 2, tempCanvas.height / 2);
            tempCtx.rotate((degrees * Math.PI) / 180);
            tempCtx.drawImage(currentImage, -currentImage.width / 2, -currentImage.height / 2);

            const rotatedImage = new Image();
            rotatedImage.onload = function() {
                currentImage = rotatedImage;
                rotation = 0;
                displayImage();
            };
            rotatedImage.src = tempCanvas.toDataURL();
        }

        function resetImage() {
            if (!originalImage) return;
            currentImage = originalImage;
            rotation = 0;
            resetControls();
            displayImage();
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'fotocolours-edited.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
