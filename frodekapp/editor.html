<!DOCTYPE html>
<html lang="nn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frødekapp — Quiz-editor</title>
    <link rel="stylesheet" href="../css/neobrutalisme.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-light-theme="classic" data-dark-theme="space" data-theme="classic">
    <div class="page-wrapper">
        <neo-header></neo-header>
        <main class="main-content">

            <div class="box2 hero-box">
                <img src="../_resources/frødekapp.png" alt="Frødekapp" class="hero-logo">
                <div class="hero-text">
                    <h1>Quiz-editor</h1>
                    <p>Lag din eigen quiz — last ned som fil, eller lagre i det lokale biblioteket.</p>
                </div>
            </div>

            <!-- Quiz-metadata -->
            <div class="box1">
                <h2 class="heading3 no-mt">Quiz-info</h2>
                <div class="form-group">
                    <label for="quiz-title">Tittel</label>
                    <input type="text" class="form-input" id="quiz-title" placeholder="T.d. Norsk geografi">
                </div>
                <div class="form-group">
                    <label for="quiz-desc">Skildring</label>
                    <textarea class="form-input" id="quiz-desc" placeholder="Kort skildring av quizen…" rows="2"></textarea>
                </div>
                <div class="q-footer">
                    <div class="form-group">
                        <label for="quiz-author">Forfattar</label>
                        <input type="text" class="form-input" id="quiz-author" placeholder="Ditt namn">
                    </div>
                    <div class="form-group">
                        <label for="quiz-tags">Taggar (kommaseparert)</label>
                        <input type="text" class="form-input" id="quiz-tags" placeholder="t.d. geografi, noreg, 5. trinn">
                    </div>
                </div>
                <div class="form-group">
                    <label for="upload-json">Last opp eksisterande quiz (JSON)</label>
                    <input type="file" id="upload-json" accept=".json">
                </div>
            </div>

            <!-- Spørsmål -->
            <div class="fk-row between mt-24 mb-16">
                <h2 class="heading3 no-mt">Spørsmål <span id="question-count">0</span></h2>
                <button class="btn" id="btn-add-question"><span data-icon="plus" data-icon-size="18"></span> Legg til spørsmål</button>
            </div>

            <div id="questions-list"></div>

            <div class="mt-16">
                <button class="btn full-width" id="btn-add-question-bottom"><span data-icon="plus" data-icon-size="18"></span> Legg til spørsmål</button>
            </div>

            <!-- Verktøylinje -->
            <div class="box1 fk-row mt-24">
                <button class="btn" id="btn-download"><span data-icon="download" data-icon-size="18"></span> Last ned JSON</button>
                <button class="btn" id="btn-save-local"><span data-icon="library" data-icon-size="18"></span> Lagre til bibliotek</button>
                <button class="btn" id="btn-preview"><span data-icon="eye" data-icon-size="18"></span> Førehandsvising</button>
                <button class="btn" id="btn-save-draft"><span data-icon="save" data-icon-size="18"></span> Lagre utkast</button>
                <button class="btn" id="btn-load-draft"><span data-icon="folderOpen" data-icon-size="18"></span> Last utkast</button>
            </div>

        </main>
    </div>

    <!-- Førehandsvising -->
    <div id="preview-overlay" role="dialog" aria-modal="true" aria-label="Førehandsvising">
        <div class="preview-inner">
            <div class="preview-head">
                <h2 class="heading3 no-mt">Førehandsvising</h2>
                <button class="btn btn-small btn-danger" id="btn-close-preview" aria-label="Lukk førehandsvising"><span data-icon="x" data-icon-size="16"></span> Lukk</button>
            </div>
            <div id="preview-content"></div>
        </div>
    </div>

    <script src="../js/vyrdepil-storage.js"></script>
    <script src="js/icons.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/quiz-engine.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/editor.js"></script>
    <script src="../js/neobrutalisme.js"></script>
    <script src="../js/neo-header.js"></script>
</body>
</html>
